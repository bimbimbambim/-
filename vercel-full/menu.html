<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍱 Меню - Food Order Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0a0a0a; color: #ffffff; }
        .gradient { background: linear-gradient(135deg, #10b981 0%, #059669 100%); }
        .card { background: #1a1a1a; border: 1px solid #333; }
        .menu-item { transition: all 0.3s ease; }
        .menu-item:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div id="app">
        <!-- Header -->
        <div class="gradient p-6 text-center">
            <div class="text-6xl mb-4">🍱</div>
            <h1 class="text-4xl font-bold mb-2">Меню</h1>
            <p class="text-green-100">Выберите из нашего ассортимента</p>
        </div>

        <!-- Controls -->
        <div class="max-w-6xl mx-auto p-4">
            <div class="flex flex-wrap gap-4 mb-6 justify-center">
                <button onclick="togglePrices()" class="bg-green-600 text-white px-6 py-3 rounded-lg hover:bg-green-700 transition-all">
                    💰 Показать цены
                </button>
                <button onclick="refreshMenu()" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition-all">
                    🔄 Обновить
                </button>
                <button onclick="printMenu()" class="bg-purple-600 text-white px-6 py-3 rounded-lg hover:bg-purple-700 transition-all">
                    🖨️ Печать
                </button>
                <button onclick="showAdminPanel()" class="bg-orange-600 text-white px-6 py-3 rounded-lg hover:bg-orange-700 transition-all">
                    ⚙️ Управление
                </button>
            </div>

            <!-- Search -->
            <div class="mb-6">
                <input type="text" placeholder="🔍 Поиск блюд..." class="w-full p-3 rounded-lg bg-gray-800 text-white border border-gray-700" oninput="searchMenu(this.value)">
            </div>

            <!-- Categories -->
            <div class="flex flex-wrap gap-2 mb-6" id="categories">
                <button onclick="filterCategory('all')" class="px-4 py-2 rounded-lg bg-green-600 text-white">🍱 Все</button>
                <button onclick="filterCategory('Горячие блюда')" class="px-4 py-2 rounded-lg bg-gray-700 text-white hover:bg-gray-600">🔥 Горячие блюда</button>
                <button onclick="filterCategory('Закуски')" class="px-4 py-2 rounded-lg bg-gray-700 text-white hover:bg-gray-600">🍟 Закуски</button>
                <button onclick="filterCategory('Напитки')" class="px-4 py-2 rounded-lg bg-gray-700 text-white hover:bg-gray-600">🥤 Напитки</button>
                <button onclick="filterCategory('Салаты')" class="px-4 py-2 rounded-lg bg-gray-700 text-white hover:bg-gray-600">🥗 Салаты</button>
                <button onclick="filterCategory('Десерты')" class="px-4 py-2 rounded-lg bg-gray-700 text-white hover:bg-gray-600">🍰 Десерты</button>
            </div>

            <!-- Menu Grid -->
            <div id="menu-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                <!-- Menu items will be loaded here -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="text-center py-20 hidden">
                <div class="text-6xl mb-4">🔍</div>
                <div class="text-xl text-gray-400">Блюда не найдены</div>
            </div>
        </div>

        <!-- Admin Panel -->
        <div id="admin-panel" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
            <div class="card rounded-lg p-6 max-w-2xl w-full mx-4 max-h-[80vh] overflow-y-auto">
                <h3 class="text-xl font-bold mb-4">⚙️ Управление меню</h3>
                
                <div class="mb-6">
                    <button onclick="openAddProductModal()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 mb-4">
                        ➕ Добавить блюдо
                    </button>
                    <div id="products-management" class="space-y-2">
                        <!-- Products list for management -->
                    </div>
                </div>
                
                <button onclick="hideAdminPanel()" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">
                    Закрыть
                </button>
            </div>
        </div>

        <!-- Add Product Modal -->
        <div id="add-product-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
            <div class="card rounded-lg p-6 max-w-md w-full mx-4">
                <h3 class="text-lg font-bold mb-4">➕ Добавить блюдо</h3>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm mb-1">Название:</label>
                        <input type="text" id="new-product-name" class="w-full p-2 rounded bg-gray-800 text-white">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Эмодзи:</label>
                        <input type="text" id="new-product-emoji" class="w-full p-2 rounded bg-gray-800 text-white" maxlength="2">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Цена продажи:</label>
                        <input type="number" id="new-product-price" class="w-full p-2 rounded bg-gray-800 text-white">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Цена закупки:</label>
                        <input type="number" id="new-product-cost" class="w-full p-2 rounded bg-gray-800 text-white">
                    </div>
                    <div>
                        <label class="block text-sm mb-1">Категория:</label>
                        <select id="new-product-category" class="w-full p-2 rounded bg-gray-800 text-white">
                            <option value="Горячие блюда">Горячие блюда</option>
                            <option value="Закуски">Закуски</option>
                            <option value="Напитки">Напитки</option>
                            <option value="Салаты">Салаты</option>
                            <option value="Десерты">Десерты</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button onclick="saveNewProduct()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">Сохранить</button>
                    <button onclick="closeAddProductModal()" class="bg-gray-600 text-white px-4 py-2 rounded hover:bg-gray-700">Отмена</button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="gradient p-6 text-center mt-12">
            <p class="text-green-100 mb-2">📞 Для заказа: +7 (900) 123-45-67</p>
            <p class="text-green-100">📍 Доставка по городу</p>
        </div>
    </div>

    <script>
        // Data management with localStorage
        class MenuManager {
            constructor() {
                this.loadData();
            }

            loadData() {
                this.products = JSON.parse(localStorage.getItem('products') || '[]');
                
                // Initialize with sample data if empty
                if (this.products.length === 0) {
                    this.initSampleData();
                }
            }

            saveData() {
                localStorage.setItem('products', JSON.stringify(this.products));
            }

            initSampleData() {
                this.products = [
                    { id: 1, name: 'Бургер классический', emoji: '🍔', price: 299, cost: 180, category: 'Горячие блюда' },
                    { id: 2, name: 'Картошка фри', emoji: '🍟', price: 149, cost: 90, category: 'Закуски' },
                    { id: 3, name: 'Кола', emoji: '🥤', price: 99, cost: 60, category: 'Напитки' },
                    { id: 4, name: 'Салат Цезарь', emoji: '🥗', price: 249, cost: 150, category: 'Салаты' },
                    { id: 5, name: 'Пицца Маргарита', emoji: '🍕', price: 499, cost: 300, category: 'Горячие блюда' },
                    { id: 6, name: 'Сок апельсиновый', emoji: '🧃', price: 129, cost: 80, category: 'Напитки' },
                    { id: 7, name: 'Чизбургер', emoji: '🍔', price: 329, cost: 200, category: 'Горячие блюда' },
                    { id: 8, name: 'Наггетсы', emoji: '🍗', price: 199, cost: 120, category: 'Закуски' }
                ];
                this.saveData();
            }

            addProduct(product) {
                product.id = Date.now();
                product.createdAt = new Date().toISOString();
                this.products.push(product);
                this.saveData();
            }

            updateProduct(id, updates) {
                const index = this.products.findIndex(p => p.id === id);
                if (index !== -1) {
                    this.products[index] = { ...this.products[index], ...updates };
                    this.saveData();
                }
            }

            deleteProduct(id) {
                this.products = this.products.filter(p => p.id !== id);
                this.saveData();
            }
        }

        const menuManager = new MenuManager();
        let showPrices = true;
        let currentCategory = 'all';
        let searchTerm = '';

        // Load menu
        function loadMenu() {
            renderMenu();
        }

        // Render menu
        function renderMenu() {
            const menuGrid = document.getElementById('menu-grid');
            const emptyState = document.getElementById('empty-state');
            
            let filteredProducts = menuManager.products.filter(product => {
                const matchesCategory = currentCategory === 'all' || product.category === currentCategory;
                const matchesSearch = product.name.toLowerCase().includes(searchTerm.toLowerCase());
                return matchesCategory && matchesSearch;
            });

            if (filteredProducts.length === 0) {
                menuGrid.innerHTML = '';
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                menuGrid.innerHTML = filteredProducts.map(product => `
                    <div class="menu-item card rounded-lg p-6 text-center cursor-pointer" onclick="copyPrice('${product.name}', ${product.price})">
                        <div class="text-5xl mb-3">${product.emoji}</div>
                        <h3 class="font-bold text-lg mb-2">${product.name}</h3>
                        <div class="text-sm text-gray-400 mb-3">${product.category}</div>
                        ${showPrices ? `
                            <div class="text-2xl font-bold text-green-400">${product.price} ₽</div>
                        ` : `
                            <div class="text-gray-500">Цена по запросу</div>
                        `}
                    </div>
                `).join('');
            }
        }

        // Toggle prices
        function togglePrices() {
            showPrices = !showPrices;
            const button = event.target;
            button.textContent = showPrices ? '👁 Скрыть цены' : '💰 Показать цены';
            renderMenu();
        }

        // Filter by category
        function filterCategory(category) {
            currentCategory = category;
            
            // Update button styles
            document.querySelectorAll('#categories button').forEach(btn => {
                btn.classList.remove('bg-green-600');
                btn.classList.add('bg-gray-700');
            });
            event.target.classList.remove('bg-gray-700');
            event.target.classList.add('bg-green-600');
            
            renderMenu();
        }

        // Search menu
        function searchMenu(term) {
            searchTerm = term;
            renderMenu();
        }

        // Copy price
        function copyPrice(name, price) {
            const text = `${name}: ${price} ₽`;
            navigator.clipboard.writeText(text).then(() => {
                showToast(`Цена "${name}" скопирована!`);
            });
        }

        // Show toast
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed top-4 right-4 bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg z-50';
            toast.textContent = message;
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Refresh menu
        function refreshMenu() {
            menuManager.loadData();
            showToast('Меню обновлено!');
            renderMenu();
        }

        // Print menu
        function printMenu() {
            window.print();
        }

        // Admin panel functions
        function showAdminPanel() {
            document.getElementById('admin-panel').classList.remove('hidden');
            loadProductsManagement();
        }

        function hideAdminPanel() {
            document.getElementById('admin-panel').classList.add('hidden');
        }

        function loadProductsManagement() {
            const container = document.getElementById('products-management');
            container.innerHTML = menuManager.products.map(product => `
                <div class="bg-gray-800 p-3 rounded">
                    <div class="flex justify-between items-center">
                        <div>
                            <div class="font-semibold">${product.emoji} ${product.name}</div>
                            <div class="text-sm text-gray-400">${product.category} - ${product.price} ₽</div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editProduct(${product.id})" class="bg-blue-600 text-white px-2 py-1 rounded text-sm">✏️</button>
                            <button onclick="deleteProduct(${product.id})" class="bg-red-600 text-white px-2 py-1 rounded text-sm">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function openAddProductModal() {
            document.getElementById('add-product-modal').classList.remove('hidden');
        }

        function closeAddProductModal() {
            document.getElementById('add-product-modal').classList.add('hidden');
            // Clear form
            document.getElementById('new-product-name').value = '';
            document.getElementById('new-product-emoji').value = '';
            document.getElementById('new-product-price').value = '';
            document.getElementById('new-product-cost').value = '';
        }

        function saveNewProduct() {
            const name = document.getElementById('new-product-name').value;
            const emoji = document.getElementById('new-product-emoji').value || '🍽️';
            const price = parseFloat(document.getElementById('new-product-price').value);
            const cost = parseFloat(document.getElementById('new-product-cost').value);
            const category = document.getElementById('new-product-category').value;
            
            if (!name || !price || !cost) {
                alert('Заполните название, цену продажи и закупки');
                return;
            }
            
            const product = { name, emoji, price, cost, category };
            menuManager.addProduct(product);
            closeAddProductModal();
            loadMenu();
            loadProductsManagement();
            
            showToast('Блюдо успешно добавлено!');
        }

        function deleteProduct(id) {
            if (confirm('Удалить это блюдо?')) {
                menuManager.deleteProduct(id);
                loadMenu();
                loadProductsManagement();
                showToast('Блюдо удалено');
            }
        }

        function editProduct(id) {
            const product = menuManager.products.find(p => p.id === id);
            if (product) {
                // For simplicity, just show the product info
                alert(`Редактирование: ${product.name}\nВ полной версии будет доступно редактирование`);
            }
        }

        // Initialize
        loadMenu();
    </script>
</body>
</html>
